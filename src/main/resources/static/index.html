<!DOCTYPE html>
<html>
<head>
    <title>Chat App</title>
    <style>

        body {
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .left-panel {
            width: 30%;
        }

        .right-panel {
            width: 65%;
            background-color: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
            min-height: 400px;
        }

        #chat {
            list-style: none;
            padding: 0;
        }

        #chat li {
            margin: 8px 0;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            color: white;
        }
    </style>
</head>

<body>

<h2>Chat Application</h2>

<div class="container">

    <div class="left-panel">

        <input
                type="text"
                id="username"
                placeholder="Your Name">

        <br><br>

        <input
                type="text"
                id="message"
                placeholder="Type Message">

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

    <div class="right-panel">
        <h3>Messages</h3>
        <ul id="chat"></ul>
    </div>

</div>

<hr>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

<script>
    const colors = [
    "#F2DECA",
    "#F2F2CA",
    "#CDF4BE",
    "#FBF5EF",
    "#FBFBEF",
    "#F5FBEF",
    "#FADCE9",
    "#FADEDC"
];


    let stompClient = null;

    const socket =
          new SockJS('/chat');

    stompClient =
          Stomp.over(socket);

    stompClient.connect(
    {}, function() {

        stompClient.subscribe(
            '/topic/messages',

            function(message) {

                const msg =
                  JSON.parse(
                    message.body);

                const li =
                    document
                    .createElement('li');


li.innerText =
    msg.sender + " : " + msg.content;

const randomColor =
    colors[Math.floor(Math.random() * colors.length)];

li.style.backgroundColor = randomColor;
li.style.color = "black";
                document
                 .getElementById(
                 'chat')
                 .appendChild(li);
            });
    });

    function sendMessage() {

        const sender =
           document
           .getElementById(
           "username").value;

        const content =
           document
           .getElementById(
           "message").value;

        stompClient.send(
            "/app/send",
            {},

            JSON.stringify({

                sender: sender,
                content: content
            }));
    }

    window.onload = async function() {

    const response =
        await fetch('/messages');

    const messages =
        await response.json();

    messages.forEach(msg => {

        const li =
          document.createElement('li');

    });
};
</script>

</body>
</html>
