<!DOCTYPE html>
<html>
<head>
    <title>Chat App</title>

    <style>
        body {
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            font-family: Arial, sans-serif;
        }

        .right-panel {
            width: 60%;
            margin: 50px auto;
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 15px gray;
        }

        .right-panel h2 {
            text-align: center;
        }

        #chat {
            list-style: none;
            padding: 10px;
            height: 500px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        #chat li {
            margin: 8px 0;
            padding: 10px;
            border-radius: 8px;
            color: black;
        }

        input {
            width: 70%;
            padding: 15px;
            margin-bottom: 10px;
            border: 1px solid #b0c4de;
            border-radius: 5px;
            background-color: #f0f8ff;
        }

        button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 12px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #0056b3;
        }

        #chat li {
    margin: 8px 0;
    padding: 10px;
    border-radius: 8px;
    color: black;

    display: flex;
    justify-content: space-between;
    align-items: center;
}

.time {
    font-size: 12px;
    color: #555;
    margin-left: 15px;
    white-space: nowrap;
}
    </style>
</head>

<body>

<div class="right-panel">

    <h2>Chat With Fuchku</h2>

    <ul id="chat"></ul>

    <hr>

    <input
            type="text"
            id="username"
            placeholder="Your Name">

    <br><br>

    <input
            type="text"
            id="message"
            placeholder="Type Message">

    <button onclick="sendMessage()">
        Send
    </button>

</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

<script>

    const colors = [
        "#F2DECA",
        "#F2F2CA",
        "#CDF4BE",
        "#FBF5EF",
        "#FBFBEF",
        "#F5FBEF",
        "#FADCE9",
        "#FADEDC"
    ];

    let stompClient = null;

    function scrollToBottom() {

        const chat =
            document.getElementById("chat");

        chat.scrollTop =
            chat.scrollHeight;
    }

    document.getElementById("message")
        .addEventListener("keypress", function(event) {

            if (event.key === "Enter") {
                sendMessage();
            }
        });

    const socket =
        new SockJS('/chat');

    stompClient =
        Stomp.over(socket);

    stompClient.connect({}, function() {

        stompClient.subscribe(
            '/topic/messages',

            function(message) {

                const msg =
                    JSON.parse(message.body);

                const li =
                    document.createElement('li');

                const time =
                    msg.timestamp
                        ? new Date(msg.timestamp)
                            .toLocaleTimeString('en-IN', {
            timeZone: 'Asia/Kolkata'
        })
                        : new Date()
                            .toLocaleTimeString('en-IN', {
            timeZone: 'Asia/Kolkata'
        });


li.innerHTML =
    "<span>" +
    msg.sender +
    " : " +
    msg.content +
    "</span>" +
    "<span class='time'>" +
    time +
    "</span>";

                const randomColor =
                    colors[Math.floor(
                        Math.random() * colors.length
                    )];

                li.style.backgroundColor =
                    randomColor;

                document
                    .getElementById('chat')
                    .appendChild(li);

                scrollToBottom();
            });
    });

    function sendMessage() {

        const sender =
            document
                .getElementById("username")
                .value;

        const content =
            document
                .getElementById("message")
                .value
                .trim();

        if (content === "") {
            return;
        }

        stompClient.send(
            "/app/send",
            {},
            JSON.stringify({
                sender: sender,
                content: content
            })
        );

        document
            .getElementById("message")
            .value = "";
    }

    function loadMessages() {

        fetch('/messages')
            .then(response => response.json())
            .then(messages => {

                const chat =
                    document.getElementById("chat");

                chat.innerHTML = "";

                messages.forEach(msg => {

                    const li =
                        document.createElement("li");

                    const time =
                        msg.timestamp
                            ? new Date(msg.timestamp)
                                .toLocaleTimeString()
                            : "";


li.innerHTML =
    "<span>" +
    msg.sender +
    " : " +
    msg.content +
    "</span>" +
    "<span class='time'>" +
    time +
    "</span>";
                    const randomColor =
                        colors[Math.floor(
                            Math.random() * colors.length
                        )];

                    li.style.backgroundColor =
                        randomColor;

                    chat.appendChild(li);
                });

                scrollToBottom();
            });
    }

    window.onload = function() {
        loadMessages();
    };

</script>

</body>
</html>
