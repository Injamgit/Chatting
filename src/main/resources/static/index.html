<!DOCTYPE html>
<html>
<head>
    <title>Chat App</title>
    <style>


        body {
    background: linear-gradient(to right, #74ebd5, #ACB6E5);
    font-family: Arial, sans-serif;
}

.right-panel {
    width: 60%;
    margin: 50px auto;
    background-color: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 0 15px gray;
}

.right-panel h2 {
    text-align: center;
}

button {
    padding: 8px 15px;
}

#chat {
    list-style: none;
    padding: 0;
}

#chat li {
    margin: 8px 0;
    padding: 10px;
    border-radius: 8px;
    color: black;
}

input {
            width: 70%;
            padding: 20px;
            margin-bottom: 10px;
            border: 1px solid #b0c4de;
            border-radius: 5px;
            background-color: #f0f8ff;
        }

button {
        background-color: #007BFF;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        }
button:hover {
    background-color: #0056b3;
}
    </style>
</head>

<body>

    <div class="right-panel">

        <h2>Chat With Fuchku</h2>

        <ul id="chat"></ul>

        <hr>

        <input type="text" id="username" placeholder="Your Name">

        <br><br>

        <input type="text" id="message" placeholder="Type Message">

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

</div>

<hr>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

<script>
    const colors = [
    "#F2DECA",
    "#F2F2CA",
    "#CDF4BE",
    "#FBF5EF",
    "#FBFBEF",
    "#F5FBEF",
    "#FADCE9",
    "#FADEDC"
];

document.getElementById("message")
    .addEventListener("keypress", function(event) {

        if (event.key === "Enter") {
            sendMessage();
        }
});

    let stompClient = null;

    const socket =
          new SockJS('/chat');

    stompClient =
          Stomp.over(socket);

    stompClient.connect(
    {}, function() {

        stompClient.subscribe(
            '/topic/messages',

            function(message) {

                const msg =
                  JSON.parse(
                    message.body);

                const li =
                    document
                    .createElement('li');


li.innerText =
    msg.sender + " : " + msg.content;

const randomColor =
    colors[Math.floor(Math.random() * colors.length)];

li.style.backgroundColor = randomColor;
li.style.color = "black";
                document
                 .getElementById(
                 'chat')
                 .appendChild(li);
            });
    });

    function sendMessage() {

        const sender =
           document
           .getElementById(
           "username").value;

        const content =
           document
           .getElementById(
           "message").value.trim();

           if(content === "") {
        return;
    }


        stompClient.send(
            "/app/send",
            {},

            JSON.stringify({

                sender: sender,
                content: content
            }));
        document.getElementById("message").value = "";
    }

    window.onload = async function() {

    const response =
        await fetch('/messages');

    const messages =
        await response.json();

    messages.forEach(msg => {

        const li =
          document.createElement('li');

    });
};
</script>

</body>
</html>
